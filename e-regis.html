    <!-- registration form -->

    <div class="form_cont">

    <form class="form_card" action="devpro.php" method="POST">
<h2>Registration</h2>
<!-- name -->
        <div class="details">
        <label>Name</label>
        <input type="text" name="fname" placeholder="john doe" required>
        </div>

<!-- email -->

         <div class="details">
        <label>E-Mail</label>
        <input type="email" name="email" placeholder="example@gmail.com" required>
        </div>

<!-- username -->

          <div class="details">
        <label>Username</label>
        <input type="text" name="userName" placeholder="username" required>
        </div>

 <!-- password -->

          <div class="details">
        <label>Password</label>
        <input type="password" name="passWord" placeholder="password" required>
        </div>



<!-- date of birth -->
         <div class="details">
        <label>Date of Birth</label>
        <input type="date" name="dob" placeholder="" required>
        </div>

        <!-- address -->
        <div class="details">
        <label>Address</label>
        <input type="text" name="address" placeholder="address" required>
        </div>


        <div class="details">
        <label>Gender</label>
        <select name="gender">
            <option>select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        </div>

<div>
    <input type="submit" name="sub_btn" value="Register" class="button">
</div>



    </form>
